<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Средний балл</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3366cc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon-128.png">
  <link rel="preconnect" href="https://cdn.sheetjs.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.sheetjs.com">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui,'Segoe UI',Roboto,sans-serif; }
    body { background:#f8f9fa; min-height:100vh; display:flex; justify-content:center; align-items:flex-start; padding:1rem; padding-top:max(1rem,env(safe-area-inset-top)); padding-bottom:max(1rem,env(safe-area-inset-bottom)); }
    .dashboard { max-width:900px; width:100%; display:flex; flex-direction:column; gap:1.2rem; background:white; border-radius:1.2rem; box-shadow:0 2px 12px rgba(0,0,0,0.06); padding:1.5rem; }
    .main-panel { display:flex; flex-direction:column; gap:1.2rem; }
    .header-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.6rem; }
    h2 { font-weight:600; font-size:1.3rem; color:#1a2639; }
    .subjects-list { display:flex; flex-direction:column; gap:0.35rem; max-height:50vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .subject-row { display:flex; align-items:center; gap:0.5rem; padding:0.35rem 0.5rem; border-radius:0.5rem; transition:background 0.15s; border:1px solid transparent; }
    .subject-row.active { background:#f5f8ff; border-color:#d0ddf5; }
    .subject-row.inactive { opacity:0.45; }
    .toggle-check { width:1.1rem; height:1.1rem; accent-color:#3366cc; cursor:pointer; flex-shrink:0; }
    .subject-name { flex:1; font-size:0.9rem; color:#333; border:none; background:transparent; padding:0.2rem 0.3rem; border-radius:0.3rem; outline:none; min-width:80px; }
    .subject-name:focus { background:#eef3fc; }
    .grade-input { width:44px; padding:0.3rem; border:1px solid #ddd; border-radius:0.5rem; text-align:center; font-size:0.9rem; transition:0.15s; }
    .grade-input:focus { outline:none; border-color:#3366cc; box-shadow:0 0 0 2px rgba(51,102,204,0.12); }
    .grade-input.invalid { border-color:#d94444; background:#fff7f7; }
    .remove-btn { background:none; border:none; color:#bbb; font-size:1rem; cursor:pointer; padding:0.2rem 0.3rem; line-height:1; border-radius:0.3rem; transition:0.15s; flex-shrink:0; }
    .remove-btn:hover { color:#d94444; background:#fceeef; }
    .controls { display:flex; gap:0.4rem; flex-wrap:wrap; }
    .btn { border:1px solid #ddd; background:white; padding:0.45rem 0.8rem; border-radius:2rem; font-size:0.8rem; cursor:pointer; transition:0.2s; color:#444; white-space:nowrap; }
    .btn:active { background:#e8ecf2; }
    .btn.export-btn { background:#e8f5e9; border-color:#a5d6a7; color:#2e7d32; }
    .btn.export-btn:active { background:#c8e6c9; }
    .btn.import-btn { background:#e3f2fd; border-color:#90caf9; color:#1565c0; }
    .btn.import-btn:active { background:#bbdefb; }
    .average-box { background:#f5f8ff; border-radius:0.8rem; padding:0.8rem 1rem; display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; }
    .avg-label { font-size:0.85rem; color:#666; }
    .avg-value { font-size:2rem; font-weight:650; color:#1a2d4a; }
    .backend-wrapper { border-top:1px solid #eef1f5; padding-top:0.6rem; }
    .backend-toggle { display:flex; align-items:center; gap:0.4rem; cursor:pointer; font-size:0.8rem; color:#777; user-select:none; padding:0.3rem 0; transition:color 0.15s; }
    .backend-toggle:active { color:#444; }
    .backend-toggle .arrow { display:inline-block; transition:transform 0.2s; font-size:0.7rem; }
    .backend-toggle.open .arrow { transform:rotate(90deg); }
    .backend-content { display:none; margin-top:0.4rem; }
    .backend-content.visible { display:block; }
    .backend-log { background:#1c2128; border-radius:0.7rem; padding:0.7rem 0.9rem; font-family:'JetBrains Mono','Fira Code',monospace; font-size:0.7rem; line-height:1.55; color:#c8d6e0; max-height:200px; overflow-y:auto; white-space:pre-wrap; word-break:break-word; }
    .log-line { padding:0.12rem 0; border-bottom:1px solid #2a3138; }
    .highlight { color:#f0c060; font-weight:500; }
    .hint { font-size:0.7rem; color:#999; }
    #fileInput { display:none; }
    .loading { text-align:center; padding:2rem; color:#999; }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="main-panel">
    <div class="header-row">
      <h2>📊 Средний балл</h2>
      <div class="controls">
        <button class="btn" id="addSubjectBtn">+ Добавить</button>
        <button class="btn" id="resetDemoBtn">↺ Сброс</button>
        <button class="btn export-btn" id="exportBtn" disabled>📥</button>
        <button class="btn import-btn" id="importBtn" disabled>📤</button>
      </div>
    </div>
    <div class="subjects-list" id="subjectsContainer"></div>
    <div class="average-box">
      <span class="avg-label">Средний балл</span>
      <span class="avg-value" id="averageDisplay">—</span>
    </div>
    <div class="hint">✅ Включённые предметы · Оценки — целые числа</div>
    <div class="backend-wrapper">
      <div class="backend-toggle" id="backendToggle">
        <span class="arrow">▶</span> Бэкенд вычислений
      </div>
      <div class="backend-content" id="backendContent">
        <div class="backend-log" id="logContainer">Ожидание данных...</div>
      </div>
    </div>
  </div>
  <input type="file" id="fileInput" accept=".xlsx,.xls">
</div>

<script>
// Лёгкая версия — загружаем SheetJS только когда нужен
let XLSX = null;
let xlsxLoading = false;
let xlsxLoadPromise = null;

function loadXLSX() {
  if (XLSX) return Promise.resolve(XLSX);
  if (xlsxLoadPromise) return xlsxLoadPromise;
  
  xlsxLoading = true;
  xlsxLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
    script.onload = () => {
      XLSX = window.XLSX;
      document.getElementById('exportBtn').disabled = false;
      document.getElementById('importBtn').disabled = false;
      resolve(XLSX);
    };
    script.onerror = reject;
    document.head.appendChild(script);
  });
  return xlsxLoadPromise;
}

// Основной код (работает сразу, без XLSX)
(function(){
let subjects=[];
function g(){return Date.now().toString(36)+Math.random().toString(36).substring(2,6)}
function setSchool(){
  const l=['Русский язык','Литература','Иностранный язык','Математика','История','Обществознание','География','Информатика','Физика','Химия','Биология','Музыка','Изобразительное искусство','Труд','ОБЖ','Физическая культура'];
  subjects=l.map(n=>({id:g(),name:n,grade:4,active:true}));
}
function load(){
  try{const s=localStorage.getItem('subjects_data');if(s){subjects=JSON.parse(s);if(!Array.isArray(subjects)||subjects.length===0)setSchool()}else setSchool()}catch(e){setSchool()}
}
function save(){try{localStorage.setItem('subjects_data',JSON.stringify(subjects))}catch(e){}}
load();
const sc=document.getElementById('subjectsContainer');
const ad=document.getElementById('averageDisplay');
const lc=document.getElementById('logContainer');
const ab=document.getElementById('addSubjectBtn');
const rb=document.getElementById('resetDemoBtn');
const eb=document.getElementById('exportBtn');
const ib=document.getElementById('importBtn');
const fi=document.getElementById('fileInput');
const bt=document.getElementById('backendToggle');
const bc=document.getElementById('backendContent');
bt.addEventListener('click',()=>{const o=bc.classList.toggle('visible');bt.classList.toggle('open',o)});
function rtt(v){const m=v*10000;const ip=Math.floor(m);const fd=ip%10;const bt=Math.floor(ip/10);let ft,d;if(fd>=5){ft=bt+1;d=`4-я цифра = ${fd} ≥ 5 → +1 к 3-й`}else{ft=bt;d=`4-я цифра = ${fd} ≤ 4 → оставляем`}return{roundedValue:ft/1000,exactValue:v,decision:d}}
function isInt(v){return typeof v==='number'&&!isNaN(v)&&Number.isInteger(v)}
function calcAvg(){const as=subjects.filter(s=>s.active&&isInt(s.grade));const c=as.length;let ll=[];ll.push(`Всего предметов: ${subjects.length}`);ll.push(`Активных с оценкой: ${c}`);const bad=subjects.filter(s=>s.active&&!isInt(s.grade));if(bad.length>0)ll.push(`⚠ Пропущено: ${bad.length}`);if(c===0){ll.push(`Средний балл не определён.`);ul(ll);return null}let sum=0;as.forEach((s,i)=>{sum+=s.grade;ll.push(`  ${i+1}. ${s.name} = ${s.grade}`)});const ea=sum/c;const rr=rtt(ea);ll.push(`Сумма = ${sum}`);ll.push(`Количество = ${c}`);ll.push(`Частное = ${ea}`);ll.push(`До 6 знаков: ${ea.toFixed(6)}`);ll.push(`${rr.decision}`);ll.push(`Результат: ${rr.roundedValue}`);ul(ll);return{average:rr.roundedValue,exact:ea,sum,count:c}}
function ul(la){if(!lc)return;lc.innerHTML=la.map(l=>l.startsWith('Результат:')?`<div class="log-line"><span class="highlight">${l}</span></div>`:`<div class="log-line">${l}</div>`).join('')}
function ua(){const r=calcAvg();ad.textContent=(r&&!isNaN(r.average))?r.average.toFixed(3):'—'}
function fr(){rsl();ua();save()}
function usr(s){const r=document.querySelector(`.subject-row[data-id="${s.id}"]`);if(!r)return;r.classList.toggle('active',s.active);r.classList.toggle('inactive',!s.active);const cb=r.querySelector('.toggle-check');if(cb)cb.checked=s.active;const inp=r.querySelector('.grade-input');if(inp){const v=isInt(s.grade)?s.grade:'';inp.value=v;inp.classList.toggle('invalid',s.active&&!isInt(s.grade)&&s.grade!==null)}}
function rsl(){if(!sc)return;if(subjects.length===0){sc.innerHTML='<div style="padding:1rem;text-align:center;color:#999;">Нет предметов</div>';return}let h='';subjects.forEach(s=>{const v=isInt(s.grade)?s.grade:'';const ac=s.active?'active':'inactive';const ic=s.active&&v===''&&s.grade!==null?'invalid':'';h+=`<div class="subject-row ${ac}" data-id="${s.id}"><input type="checkbox" class="toggle-check" data-id="${s.id}" ${s.active?'checked':''}><input type="text" class="subject-name" value="${eh(s.name)}" data-id="${s.id}"><input type="number" class="grade-input ${ic}" value="${v}" placeholder="4" step="1" data-id="${s.id}"><button class="remove-btn" data-id="${s.id}">✕</button></div>`});sc.innerHTML=h;sc.querySelectorAll('.toggle-check').forEach(cb=>cb.addEventListener('change',ta));sc.querySelectorAll('.subject-name').forEach(inp=>{inp.addEventListener('blur',sn);inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur()}})});sc.querySelectorAll('.grade-input').forEach(inp=>{inp.addEventListener('blur',sg);inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur()}})});sc.querySelectorAll('.remove-btn').forEach(btn=>btn.addEventListener('click',rs))}
function eh(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function sn(e){const id=e.target.dataset.id;const s=subjects.find(s=>s.id===id);if(!s)return;const nn=e.target.value.trim()||'Без названия';if(s.name!==nn){s.name=nn;ua();save()}e.target.value=s.name}
function sg(e){const id=e.target.dataset.id;const s=subjects.find(s=>s.id===id);if(!s)return;const raw=e.target.value.trim();let ng=null;if(raw!==''){const p=parseFloat(raw);if(!isNaN(p))ng=Math.round(p)}const old=s.grade;s.grade=ng;e.target.value=ng!==null?ng:'';usr(s);if(old!==ng){ua();save()}}
function ta(e){const id=e.target.dataset.id;const s=subjects.find(s=>s.id===id);if(s){s.active=e.target.checked;usr(s);ua();save()}}
function rs(e){const id=e.target.dataset.id;subjects=subjects.filter(s=>s.id!==id);fr()}

// Экспорт/импорт загружают XLSX только при первом использовании
eb.addEventListener('click', async () => {
  eb.disabled = true;
  eb.textContent = '...';
  try {
    await loadXLSX();
    exportXlsx();
  } catch(e) {
    alert('Ошибка загрузки Excel. Проверьте интернет.');
  }
  eb.disabled = false;
  eb.textContent = '📥';
});

ib.addEventListener('click', () => {
  ib.disabled = true;
  ib.textContent = '...';
  loadXLSX().then(() => {
    fi.click();
    ib.disabled = false;
    ib.textContent = '📤';
  }).catch(() => {
    alert('Ошибка загрузки Excel. Проверьте интернет.');
    ib.disabled = false;
    ib.textContent = '📤';
  });
});

fi.addEventListener('change', (e) => {
  if (e.target.files.length > 0 && XLSX) {
    importXlsx(e.target.files[0]);
    fi.value = '';
  }
});

function exportXlsx() {
  const r = calcAvg();
  const as = subjects.filter(s => s.active && isInt(s.grade));
  const d = [['Предмет', 'Оценка']];
  as.forEach(s => d.push([s.name, s.grade]));
  if (r) {
    d.push([]);
    d.push(['Сумма', r.sum]);
    d.push(['Количество', r.count]);
    d.push(['Точное среднее', r.exact]);
    d.push(['Округлённое (до тысячных)', r.average]);
  }
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(d);
  ws['!cols'] = [{wch:28},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws, 'Средний балл');
  XLSX.writeFile(wb, `средний_балл_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function importXlsx(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});
      if (rows.length < 2) { alert('Файл пуст.'); return; }
      const h = rows[0];
      const ni = h.findIndex(h => h && h.toString().toLowerCase().includes('предмет'));
      const gi = h.findIndex(h => h && h.toString().toLowerCase().includes('оценка'));
      if (ni === -1 || gi === -1) { alert('Нужны столбцы "Предмет" и "Оценка".'); return; }
      const ns = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || !row[ni]) break;
        const name = String(row[ni]).trim();
        const gr = row[gi];
        if (name && gr !== undefined && gr !== null && gr !== '') {
          const gn = parseInt(gr, 10);
          if (!isNaN(gn)) ns.push({id:g(), name, grade:gn, active:true});
        }
      }
      if (ns.length === 0) { alert('Нет корректных данных.'); return; }
      subjects = ns;
      fr();
    } catch(err) {
      alert('Ошибка: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

ab.addEventListener('click',()=>{const ns={id:g(),name:'Новый предмет',grade:null,active:true};subjects.push(ns);fr();setTimeout(()=>{const row=document.querySelector(`.subject-row[data-id="${ns.id}"]`);if(row){const ni=row.querySelector('.subject-name');if(ni){ni.focus();ni.select()}}},30)});
rb.addEventListener('click',()=>{if(confirm('Сбросить к школьному списку?')){setSchool();fr()}});

if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
// Автообновление PWA
if ('serviceWorker' in navigator) {
  let refreshing = false;
  
  navigator.serviceWorker.register('sw.js').then(reg => {
    // Проверяем обновления каждые 30 минут
    setInterval(() => {
      reg.update();
    }, 30 * 60 * 1000);
    
    // Когда найден новый SW
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          // Новый SW готов — показываем уведомление
          showUpdateNotification();
        }
      });
    });
  });
  
  // Если SW контролирует страницу и меняется
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) {
      refreshing = true;
      window.location.reload();
    }
  });
  
  function showUpdateNotification() {
    // Создаём простое уведомление вверху страницы
    const banner = document.createElement('div');
    banner.style.cssText = `
      position: fixed; top: 0; left: 0; right: 0;
      background: #3366cc; color: white; padding: 0.8rem 1rem;
      text-align: center; z-index: 9999;
      font-size: 0.9rem; display: flex;
      align-items: center; justify-content: center;
      gap: 0.8rem; cursor: pointer;
    `;
    banner.innerHTML = '🔄 Доступна новая версия. <strong>Нажмите, чтобы обновить</strong>';
    banner.addEventListener('click', () => {
      banner.remove();
      navigator.serviceWorker.ready.then(reg => {
        reg.waiting.postMessage('skipWaiting');
      });
    });
    document.body.appendChild(banner);
    
    // Автоматически убираем через 10 секунд
    setTimeout(() => {
      if (banner.parentNode) banner.remove();
    }, 10000);
  }
}
fr();
})();
</script>
</body>
</html>
